<mat-toolbar fxFlex="90px" color="primary" class="navbar" fxLayout="row" fxLayoutAlign="space-between stretch">

  <a fxFlex="250px" fxLayout="row" fxLayoutAlign="center center" routerLink="/" class="logo">
    <div fxFlex="20" class="isotype"></div>
    <div fxFlex="55" class="logotype">
      <span class="name" fxShow="false" fxShow.gt-sm>PAUL</span> GUALOTUÑA
    </div>
  </a>

  <button fxFlex="80px" mat-button fxHide="false" fxHide.gt-sm (click)="manageMenu()">
    <mat-icon>more_vert</mat-icon>
  </button>

</mat-toolbar>

<div fxLayout="column" [fxShow]="showMenu" fxHide.gt-sm class="sidebar-over" (click)="manageMenu()">
  <button mat-button routerLink="/home" routerLinkActive="active">
    <mat-icon>home</mat-icon>
    <span>Home</span>
  </button>
  <button mat-button routerLink="/test">
    <mat-icon>voicemail</mat-icon>
    <span>Test</span>
  </button>
</div>

<div fxFlex fxLayout="row" fxLayoutAlign="center stretch">
  <div fxFlex="300px" fxLayout="column" fxLayoutAlign="start center" fxShow="false" fxShow.gt-sm class="sidebar">
    <div>
      <div class="avatar"></div>
    </div>
    <button mat-button routerLink="/home" routerLinkActive="active">
      <mat-icon>home</mat-icon>
      <span>Home</span>
    </button>
    <button mat-button routerLink="/test">
      <mat-icon>voicemail</mat-icon>
      <span>Test</span>
    </button>
  </div>
  <div fxFlex fxLayout="column" fxLayoutAlign="space-between center" class="scrollable">
    <router-outlet fxFlex="0px" fxShow="false"></router-outlet>
    <mat-toolbar fxFlex="90px" class="footer">
      Footer
    </mat-toolbar>
  </div>
</div>
